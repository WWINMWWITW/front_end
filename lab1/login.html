<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>sign in — loom commerce</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="page-shell page-shell--simple">
  <!-- compact header for auth -->
  <header class="page-header">
    <div class="page-header__inner">
      <a class="page-header__brand" href="index.html">loom commerce</a>
      <nav class="page-header__nav" aria-label="top navigation">
        <a class="page-header__link" href="index.html">home</a>
        <a class="page-header__link" href="catalog.html">catalog</a>
      </nav>
      <div class="page-header__actions">
        <a class="btn btn--ghost btn--sm" href="index.html">back</a>
      </div>
    </div>
  </header>

  <!-- main: centered authentication card -->
  <main class="page-main">
    <section class="login-card" aria-labelledby="login-title">
      <h1 class="login-card__title" id="login-title">welcome back</h1>
      <p class="login-card__subtitle">sign in to manage catalog, customers, and orders.</p>
      <!-- form block: includes validation error state (static) -->
      <form action="#" method="get">
        <div class="form-field">
          <label class="form-field__label" for="email">work email</label>
          <input class="form-input" id="email" name="email" type="email" autocomplete="username" placeholder="you@studio.com">
        </div>
        <div class="form-field">
          <label class="form-field__label" for="password">password</label>
          <input class="form-input form-input--error" id="password" name="password" type="password" autocomplete="current-password" value="short" aria-invalid="true" aria-describedby="password-error">
          <p class="form-error" id="password-error">password must be at least 12 characters and include a number.</p>
        </div>
        <div class="btn-row">
          <button class="btn btn--primary" type="submit">sign in</button>
          <a class="btn btn--ghost" href="index.html">cancel</a>
        </div>
      </form>
    </section>
  </main>

  <footer class="page-footer">
    <p>lab 1 — static login with error state · no javascript</p>
  </footer>
</body>
</html>
